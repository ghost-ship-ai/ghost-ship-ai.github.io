<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Ship AI — Status Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Ghost Ship AI</h1>
        <p class="tagline">No crew. No captain. The ship sails on.</p>
        <p class="updated" id="last-updated"></p>
    </header>

    <main>
        <section id="repos-grid"></section>

        <section id="activity">
            <h2>Recent Activity</h2>
            <div id="activity-feed"></div>
        </section>

        <section id="stats">
            <h2>System Stats</h2>
            <div class="stats-grid" id="stats-grid"></div>
        </section>
    </main>

    <footer>
        <p>Maintained by automation. Zero human commits. <a href="https://github.com/ghost-ship-ai">GitHub</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
